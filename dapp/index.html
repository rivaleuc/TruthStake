<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TruthStake</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse-green { 0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4) } 50% { box-shadow: 0 0 15px 5px rgba(34,197,94,0.1) } }
    @keyframes pulse-red { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4) } 50% { box-shadow: 0 0 15px 5px rgba(239,68,68,0.1) } }
    .pulse-true { animation: pulse-green 2s infinite }
    .pulse-false { animation: pulse-red 2s infinite }
    .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px) }
  </style>
</head>
<body class="bg-[#0a0a0f] text-white min-h-screen">
  <nav class="border-b border-white/5 px-6 py-4 flex justify-between items-center glass">
    <h1 class="text-xl font-bold">📰 TruthStake</h1>
    <span class="text-xs text-gray-500">Decentralized Fact-Checking Market</span>
  </nav>

  <main class="max-w-3xl mx-auto p-6 space-y-6">
    <!-- Post Claim -->
    <section class="glass rounded-2xl p-6 border border-white/10">
      <h2 class="text-cyan-400 font-semibold mb-4">Post a Claim</h2>
      <input id="claim" placeholder="Factual claim (e.g. 'Tesla delivered 500k cars in Q1')" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 mb-3 placeholder-gray-600 outline-none focus:border-cyan-500">
      <input id="source" placeholder="Source URL for verification" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 mb-3 placeholder-gray-600 outline-none focus:border-cyan-500">
      <button class="w-full bg-cyan-600 hover:bg-cyan-500 rounded-xl py-3 font-bold transition">Post & Stake TRUE</button>
    </section>

    <!-- Stake on existing -->
    <section class="glass rounded-2xl p-6 border border-white/10">
      <h2 class="text-amber-400 font-semibold mb-4">Stake on Claim</h2>
      <input placeholder="Claim key" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 mb-3 placeholder-gray-600 outline-none">
      <div class="grid grid-cols-2 gap-3">
        <button class="pulse-true bg-green-900/50 border border-green-700 hover:bg-green-800/50 rounded-xl py-3 font-bold transition">✓ Stake TRUE</button>
        <button class="pulse-false bg-red-900/50 border border-red-700 hover:bg-red-800/50 rounded-xl py-3 font-bold transition">✗ Stake FALSE</button>
      </div>
    </section>

    <!-- Resolve -->
    <section class="glass rounded-2xl p-6 border border-white/10">
      <h2 class="text-purple-400 font-semibold mb-4">Resolve (AI Judgment)</h2>
      <input placeholder="Claim key to resolve" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 mb-3 placeholder-gray-600 outline-none">
      <button class="w-full bg-purple-600 hover:bg-purple-500 rounded-xl py-3 font-bold transition">⚡ Resolve — AI Fetches Source & Judges</button>
    </section>

    <!-- Example result -->
    <section class="glass rounded-2xl p-6 border border-red-900/50">
      <div class="flex items-center gap-3 mb-2">
        <span class="px-2 py-0.5 bg-red-900/50 text-red-400 text-xs rounded-full font-mono">FALSE</span>
        <span class="text-sm text-gray-400">Claim #0</span>
      </div>
      <p class="text-sm mb-2">"OpenAI revenue exceeded 5 billion USD in 2024"</p>
      <p class="text-xs text-gray-500">Reasoning: Source returned blocked page, no evidence available → default to false.</p>
    </section>
  </main>
</body>
</html>
